<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>タスク管理ダッシュボード (Obsidian Sync)</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            blue: '#005BAC', lightblue: '#E6F2FA',
                            green: '#008851', lightgreen: '#E6F4ED',
                            orange: '#E67A00',
                            red: '#E60000', lightred: '#FCE8E8',
                            gray: '#767676', lightgray: '#F3F4F6',
                            darkblue: '#1e3a8a', darkbg: '#111827',
                            darkcard: '#1f2937', darkborder: '#374151'
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; overscroll-behavior: none; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .dark ::-webkit-scrollbar-thumb { background: #4b5563; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .dark ::-webkit-scrollbar-thumb:hover { background: #6b7280; }
    </style>
</head>
<body class="h-[100dvh] flex flex-col overflow-hidden text-sm bg-gray-100 dark:bg-brand-darkbg text-gray-900 dark:text-gray-100 transition-colors duration-200">
    <div id="root" class="h-full flex flex-col overflow-hidden"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo, useRef } from 'https://esm.sh/react@18.2.0';
        import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
        import { 
            Kanban, Search, Calendar, Inbox, Clock, Edit2, ChevronLeft, ChevronDown, ChevronRight,
            PlusCircle, Plus, Send, Github, Settings, X, Check, Save, RefreshCw, 
            Info, Loader2, Cloud, AlertCircle, LayoutList, Hash, User, Moon, Sun, Repeat, FolderPlus
        } from 'https://esm.sh/lucide-react@0.292.0';

        const getTodayString = () => new Date().toISOString().split('T')[0];

        const calculateNextDate = (currentDateStr, recurrenceRule) => {
            if (!currentDateStr || !recurrenceRule) return '';
            const date = new Date(currentDateStr);
            if (isNaN(date.getTime())) return '';
            const rule = recurrenceRule.toLowerCase().trim();
            
            if (rule.includes('day')) {
                date.setDate(date.getDate() + 1);
                if (rule.includes('weekday')) {
                    while (date.getDay() === 0 || date.getDay() === 6) date.setDate(date.getDate() + 1);
                }
            } else if (rule.includes('week')) {
                date.setDate(date.getDate() + 7);
            } else if (rule.includes('month')) {
                date.setMonth(date.getMonth() + 1);
            } else if (rule.includes('year')) {
                date.setFullYear(date.getFullYear() + 1);
            }
            return date.toISOString().split('T')[0];
        };

        const parseMarkdownToTasks = (markdown) => {
            const lines = markdown.split('\n');
            const tasks = [];
            const projects = [];
            let currentProjectName = 'Inbox';
            
            if (!projects.includes(currentProjectName)) projects.push(currentProjectName);
            let currentTask = null;

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                const headingMatch = line.match(/^(#{1,6})\s+(.*)/);
                if (headingMatch) {
                    currentProjectName = headingMatch[2].trim();
                    if (!projects.includes(currentProjectName)) projects.push(currentProjectName);
                    continue;
                }

                const taskMatch = line.match(/^(\s*)-\s*\[([ xX\/])\]\s*(.*)/);
                if (taskMatch) {
                    const statusChar = taskMatch[2].toLowerCase();
                    let content = taskMatch[3];
                    let status = statusChar === 'x' ? 'done' : statusChar === '/' ? 'in_progress' : 'todo';
                    let priority = 'normal';
                    let dueDate = '';
                    let recurrence = '';
                    const tags = [];
                    let assignee = null;
                    
                    if (content.includes('⏫')) { priority = 'high'; content = content.replace('⏫', ''); }
                    else if (content.includes('🔼')) { priority = 'medium'; content = content.replace('🔼', ''); }
                    else if (content.includes('🔽')) { priority = 'low'; content = content.replace('🔽', ''); }
                    
                    const recMatch = content.match(/🔁\s*([^⏫🔼🔽📅#]+)/);
                    if (recMatch) { recurrence = recMatch[1].trim(); content = content.replace(recMatch[0], ''); }

                    const dateMatch = content.match(/📅\s*(\d{4}-\d{2}-\d{2})/);
                    if (dateMatch) { dueDate = dateMatch[1]; content = content.replace(dateMatch[0], ''); }
                    
                    const tagRegex = /(?:^|\s)#([\p{L}\p{N}_\-\/\(\)]+)/gu;
                    let tMatch;
                    while ((tMatch = tagRegex.exec(content)) !== null) { 
                        const fullTag = tMatch[1];
                        const assigneeMatch = fullTag.match(/^担当者\((.*)\)$/);
                        if (assigneeMatch) assignee = assigneeMatch[1];
                        else tags.push(fullTag); 
                    }
                    content = content.replace(/(?:^|\s)#([\p{L}\p{N}_\-\/\(\)]+)/gu, '');
                    
                    currentTask = {
                        id: Date.now().toString() + Math.random().toString(36).substr(2, 9),
                        projectId: currentProjectName,
                        title: content.trim(), status, priority, dueDate, recurrence, tags, assignee, notes: ''
                    };
                    tasks.push(currentTask);
                } else if (currentTask && line.trim() !== '') {
                    const noteLine = line.replace(/^ {1,4}|\t/, '');
                    if (currentTask.notes === '') currentTask.notes = noteLine;
                    else currentTask.notes += '\n' + noteLine;
                }
            }
            tasks.forEach(t => { t.notes = t.notes.trimEnd(); });
            return { tasks, projects };
        };

        const serializeTasksToMarkdown = (tasks, projects) => {
            let markdown = '';
            projects.forEach(projName => {
                const projTasks = tasks.filter(t => t.projectId === projName);
                if (projTasks.length > 0 || projName !== 'Inbox') {
                    markdown += `# ${projName}\n\n`;
                    projTasks.forEach(task => {
                        let statusChar = task.status === 'done' ? 'x' : task.status === 'in_progress' ? '/' : ' ';
                        let line = `- [${statusChar}] ${task.title}`;
                        if (task.priority === 'high') line += ' ⏫';
                        if (task.priority === 'medium') line += ' 🔼';
                        if (task.priority === 'low') line += ' 🔽';
                        if (task.recurrence) line += ` 🔁 ${task.recurrence}`;
                        if (task.dueDate) line += ` 📅 ${task.dueDate}`;
                        if (task.assignee) line += ` #担当者(${task.assignee})`;
                        if (task.tags && task.tags.length > 0) task.tags.forEach(tag => { line += ` #${tag}`; });
                        markdown += `${line}\n`;
                        if (task.notes) {
                            const indentedNotes = task.notes.split('\n').map(n => `    ${n}`).join('\n');
                            markdown += `${indentedNotes}\n`;
                        }
                    });
                    markdown += '\n';
                }
            });
            return markdown.trim();
        };

        const initialSampleData = `# Webサイトリニューアル

- [ ] トップページデザイン初稿提出 📅 2026-04-10 ⏫ #担当者(佐藤) #design
- [/] ワイヤーフレームの修正 📅 2026-04-14 🔼 #担当者(鈴木)
- [x] 競合分析レポート作成 📅 2026-04-05 #担当者(佐藤)

# 社内基幹システム移行

- [ ] CMSツールの選定 📅 2026-04-15 🔽 #担当者(高橋)
- [/] 要件定義書のレビュー 📅 2026-04-12 #担当者(田中)

# Inbox

- [ ] 日報の提出 🔁 every weekday 📅 2026-04-13 #routine
`;

        function App() {
            const today = getTodayString();
            
            const [isDarkMode, setIsDarkMode] = useState(() => {
                if (localStorage.getItem('theme') === 'dark') return true;
                if (localStorage.getItem('theme') === 'light') return false;
                return window.matchMedia('(prefers-color-scheme: dark)').matches;
            });
            const toggleDarkMode = () => setIsDarkMode(!isDarkMode);
            useEffect(() => {
                const root = window.document.documentElement;
                if (isDarkMode) { root.classList.add('dark'); localStorage.setItem('theme', 'dark'); } 
                else { root.classList.remove('dark'); localStorage.setItem('theme', 'light'); }
            }, [isDarkMode]);

            const [tasks, setTasks] = useState([]);
            const [projects, setProjects] = useState(['Inbox']);
            const [activeProject, setActiveProject] = useState(null);
            const [isMobileListOpen, setIsMobileListOpen] = useState(true);
            
            const [searchQuery, setSearchQuery] = useState('');
            const [filterAssignee, setFilterAssignee] = useState('');
            const [filterTag, setFilterTag] = useState('');

            const [selectedTask, setSelectedTask] = useState(null);
            const [isSettingsOpen, setIsSettingsOpen] = useState(false);
            const [isNewProjectOpen, setIsNewProjectOpen] = useState(false);
            const [newTaskTitle, setNewTaskTitle] = useState('');
            const [newProjectName, setNewProjectName] = useState('');
            const [showCompleted, setShowCompleted] = useState(false);

            const [isInitialLoaded, setIsInitialLoaded] = useState(false); 
            const [isSyncing, setIsSyncing] = useState(false);
            const autoSaveTimerRef = useRef(null);

            // スワイプ操作用のState (右ドロワーを閉じる処理)
            const [touchStartX, setTouchStartX] = useState(null);

            const [githubConfig, setGithubConfig] = useState(() => {
                const saved = localStorage.getItem('obsidian_github_config');
                return saved ? JSON.parse(saved) : { token: '', owner: '', repo: '', path: 'Tasks.md' };
            });

            const handleFetchFromGithub = async (isInitial = false) => {
                const { token, owner, repo, path } = githubConfig;
                if (!token || !owner || !repo || !path) {
                    if (tasks.length === 0) {
                        const parsed = parseMarkdownToTasks(initialSampleData);
                        setTasks(parsed.tasks); setProjects(parsed.projects);
                    }
                    setIsInitialLoaded(true); return;
                }
                try {
                    const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
                    const res = await fetch(url, { headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' } });
                    if (!res.ok) throw new Error("File not found");
                    const data = await res.json();
                    const base64Content = data.content.replace(/\n/g, '');
                    const bytes = new Uint8Array(atob(base64Content).length);
                    for (let i = 0; i < bytes.length; i++) bytes[i] = atob(base64Content).charCodeAt(i);
                    const parsed = parseMarkdownToTasks(new TextDecoder().decode(bytes));
                    setTasks(parsed.tasks); setProjects(parsed.projects);
                } catch (error) {
                    console.error("Fetch Error:", error);
                } finally {
                    setIsInitialLoaded(true);
                }
            };

            const triggerAutoSave = (newTasks, newProjects = projects) => {
                if (!githubConfig.token) return;
                if (autoSaveTimerRef.current) clearTimeout(autoSaveTimerRef.current);
                setIsSyncing(true);
                autoSaveTimerRef.current = setTimeout(async () => {
                    try {
                        const url = `https://api.github.com/repos/${githubConfig.owner}/${githubConfig.repo}/contents/${githubConfig.path}`;
                        const headers = { 'Authorization': `token ${githubConfig.token}`, 'Accept': 'application/vnd.github.v3+json' };
                        let fileSha = null;
                        try { const getRes = await fetch(url, { headers }); if (getRes.ok) fileSha = (await getRes.json()).sha; } catch(e){}
                        const markdownContent = serializeTasksToMarkdown(newTasks, newProjects);
                        const base64Content = btoa(Array.from(new TextEncoder().encode(markdownContent), byte => String.fromCodePoint(byte)).join(""));
                        const body = { message: 'Auto-sync from Dashboard', content: base64Content };
                        if (fileSha) body.sha = fileSha;
                        await fetch(url, { method: 'PUT', headers: { ...headers, 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
                    } catch(e) { console.error(e); } finally { setIsSyncing(false); }
                }, 2000);
            };

            useEffect(() => { handleFetchFromGithub(true); }, []);

            const changeTaskStatus = (task, nextStatus) => {
                let newTasks = [...tasks];
                if (nextStatus === 'done' && task.status !== 'done' && task.recurrence) {
                    const nextDate = calculateNextDate(task.dueDate || today, task.recurrence);
                    newTasks.push({
                        ...task,
                        id: Date.now().toString() + Math.random().toString(36).substr(2, 9),
                        status: 'todo', dueDate: nextDate
                    });
                }
                newTasks = newTasks.map(t => t.id === task.id ? { ...t, status: nextStatus } : t);
                setTasks(newTasks);
                if(selectedTask && selectedTask.id === task.id) setSelectedTask({...selectedTask, status: nextStatus});
                triggerAutoSave(newTasks, projects);
            };

            const handleToggleTaskStatus = (task) => changeTaskStatus(task, task.status === 'done' ? 'todo' : task.status === 'todo' ? 'in_progress' : 'done');

            const handleQuickAdd = (e) => {
                e.preventDefault();
                if (!newTaskTitle.trim()) return;
                const newTask = { id: Date.now().toString(), projectId: activeProject || 'Inbox', title: newTaskTitle, status: 'todo', priority: 'normal', dueDate: '', recurrence: '', tags: [], assignee: null, notes: '' };
                const newTasks = [...tasks, newTask];
                setTasks(newTasks); setNewTaskTitle(''); triggerAutoSave(newTasks);
            };

            const handleUpdateTask = (updated) => {
                const newTasks = tasks.map(t => t.id === updated.id ? updated : t);
                setTasks(newTasks); setSelectedTask(updated); triggerAutoSave(newTasks);
            };

            const handleCreateProject = (e) => {
                e.preventDefault();
                const name = newProjectName.trim();
                if (!name) return;
                if (!projects.includes(name)) {
                    const newProjects = [...projects, name];
                    setProjects(newProjects); setActiveProject(name); triggerAutoSave(tasks, newProjects);
                }
                setNewProjectName(''); setIsNewProjectOpen(false); setIsMobileListOpen(false);
            };

            const selectProject = (projName) => {
                setActiveProject(projName); setIsMobileListOpen(false); setShowCompleted(false);
            };

            // スワイプ処理ハンドラ
            const handleTouchStart = (e) => setTouchStartX(e.targetTouches[0].clientX);
            const handleTouchMove = (e) => {
                if (touchStartX === null) return;
                if (e.targetTouches[0].clientX - touchStartX > 60) { // 60px以上右へスワイプで閉じる
                    setSelectedTask(null); setTouchStartX(null);
                }
            };
            const handleTouchEnd = () => setTouchStartX(null);

            const isOverdue = (task) => task.dueDate && task.dueDate < today && task.status !== 'done';
            const uniqueAssignees = useMemo(() => Array.from(new Set(tasks.map(t => t.assignee).filter(Boolean))).sort(), [tasks]);
            const uniqueTags = useMemo(() => Array.from(new Set(tasks.flatMap(t => t.tags || []))).sort(), [tasks]);

            const projectStats = useMemo(() => projects.map(projName => {
                const pTasks = tasks.filter(t => t.projectId === projName);
                const total = pTasks.length;
                const done = pTasks.filter(t => t.status === 'done').length;
                return { name: projName, total, done, overdue: pTasks.some(isOverdue), progress: total === 0 ? 0 : Math.round((done / total) * 100) };
            }), [tasks, projects]);

            const displayTasks = useMemo(() => {
                let filtered = tasks;
                if (activeProject) filtered = filtered.filter(t => t.projectId === activeProject);
                if (searchQuery) filtered = filtered.filter(t => t.title.toLowerCase().includes(searchQuery.toLowerCase()) || t.notes.toLowerCase().includes(searchQuery.toLowerCase()));
                if (filterAssignee) filtered = filtered.filter(t => t.assignee === filterAssignee);
                if (filterTag) filtered = filtered.filter(t => t.tags?.includes(filterTag));
                return filtered.sort((a, b) => {
                    if (a.status === 'done' && b.status !== 'done') return 1;
                    if (a.status !== 'done' && b.status === 'done') return -1;
                    return (a.dueDate || '9999-12-31').localeCompare(b.dueDate || '9999-12-31');
                });
            }, [tasks, activeProject, searchQuery, filterAssignee, filterTag]);

            const uncompletedTasks = displayTasks.filter(t => t.status !== 'done');
            const completedTasks = displayTasks.filter(t => t.status === 'done');

            const activeProjectTasks = tasks.filter(t => t.projectId === activeProject);
            const chartData = useMemo(() => {
                let done=0, inProgress=0, todo=0, overdue=0;
                activeProjectTasks.forEach(t => {
                    if (t.status === 'done') done++;
                    else if (isOverdue(t)) overdue++;
                    else if (t.status === 'in_progress') inProgress++;
                    else todo++;
                });
                return [done, inProgress, todo, overdue];
            }, [activeProjectTasks]);


            if (!isInitialLoaded) return <div className="h-full flex items-center justify-center bg-gray-100 dark:bg-brand-darkbg"><Loader2 className="animate-spin text-brand-blue" size={32} /></div>;

            const renderTaskRow = (task) => {
                const overdue = isOverdue(task);
                const rowBg = overdue ? 'bg-red-50 dark:bg-red-900/10' : task.status === 'done' ? 'bg-gray-50 dark:bg-gray-800/50 opacity-60' : 'hover:bg-gray-50 dark:hover:bg-gray-800';
                return (
                    <tr key={task.id} className={`${rowBg} transition cursor-pointer block md:table-row py-3 md:py-0 border-b md:border-b-0 border-gray-100 dark:border-gray-800`} onClick={() => setSelectedTask(task)}>
                        <td className="px-4 md:py-3 text-center align-middle inline-block md:table-cell" onClick={e=>e.stopPropagation()}>
                            <div className="relative flex items-center justify-center cursor-pointer" onClick={() => handleToggleTaskStatus(task)}>
                                <div className={`w-5 h-5 border-2 rounded flex items-center justify-center transition-colors ${task.status === 'done' ? 'bg-brand-green border-brand-green' : task.status === 'in_progress' ? 'bg-brand-blue border-brand-blue' : 'border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800'}`}>
                                    {task.status === 'done' && <Check size={14} className="text-white" strokeWidth={3} />}
                                    {task.status === 'in_progress' && <div className="w-2.5 h-0.5 bg-white rounded"></div>}
                                </div>
                            </div>
                        </td>
                        <td className="px-4 md:py-3 align-middle inline-block md:table-cell w-[calc(100%-3rem)] md:w-auto">
                            <span className={`font-medium ${task.status === 'done' ? 'line-through text-gray-500' : ''} ${overdue ? 'font-bold' : ''}`}>{task.title}</span>
                            {task.recurrence && <span className="ml-2 inline-flex items-center text-[10px] text-brand-blue dark:text-blue-400 border border-brand-blue/30 px-1 rounded"><Repeat size={10} className="mr-0.5"/>{task.recurrence}</span>}
                        </td>
                        {!activeProject && <td className="px-4 py-1 md:py-3 text-xs md:text-sm block md:table-cell ml-8 md:ml-0 text-gray-500 dark:text-gray-400"><span className="md:hidden mr-1 text-[10px]">Project:</span>{task.projectId}</td>}
                        <td className="px-4 py-1 md:py-3 text-xs md:text-sm block md:table-cell ml-8 md:ml-0">
                            <div className="flex items-center gap-1.5 text-gray-600 dark:text-gray-400"><span className="md:hidden mr-1 text-[10px]">担当:</span>{task.assignee ? <><User size={14}/>{task.assignee}</> : <span>-</span>}</div>
                        </td>
                        <td className="px-4 py-1 md:py-3 block md:table-cell ml-8 md:ml-0">
                            <span className="md:hidden text-gray-400 mr-1 text-[10px]">状態:</span>
                            {overdue ? <span className="inline-flex items-center px-2 py-0.5 rounded text-xs font-bold bg-white dark:bg-gray-800 text-brand-red dark:text-red-400 border border-brand-red dark:border-red-500/50">遅延</span>
                             : task.status === 'done' ? <span className="inline-flex items-center px-2 py-0.5 rounded text-xs font-bold bg-brand-lightgreen dark:bg-green-900/30 text-brand-green dark:text-green-400 border border-brand-green dark:border-green-500/50">完了</span>
                             : task.status === 'in_progress' ? <span className="inline-flex items-center px-2 py-0.5 rounded text-xs font-bold bg-brand-lightblue dark:bg-blue-900/30 text-brand-blue dark:text-blue-400 border border-brand-blue dark:border-blue-500/50">進行中</span>
                             : <span className="inline-flex items-center px-2 py-0.5 rounded text-xs font-bold bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-gray-300 border border-gray-300 dark:border-gray-600">未着手</span>}
                        </td>
                        <td className="px-4 py-1 md:py-3 block md:table-cell ml-8 md:ml-0">
                            <span className="md:hidden text-gray-400 mr-1 text-[10px]">期限:</span>
                            {task.dueDate ? <span className={`font-bold flex items-center gap-1 text-sm ${overdue ? 'text-brand-red dark:text-red-400' : task.dueDate === today ? 'text-brand-orange dark:text-orange-400' : 'text-gray-600 dark:text-gray-400'}`}>{overdue && <AlertCircle size={14}/>} {task.dueDate}</span> : <span className="text-gray-400 dark:text-gray-500">-</span>}
                        </td>
                    </tr>
                );
            };

            return (
                <div className="flex flex-col h-full font-sans bg-gray-100 dark:bg-brand-darkbg text-gray-900 dark:text-gray-100">
                    
                    <header className="bg-white dark:bg-brand-darkcard border-b border-gray-300 dark:border-brand-darkborder px-4 py-3 flex justify-between items-center shrink-0 shadow-sm z-10 transition-colors">
                        <div className="flex items-center gap-2">
                            {!isMobileListOpen && <button onClick={() => setIsMobileListOpen(true)} className="md:hidden mr-1 text-gray-500 dark:text-gray-400"><ChevronLeft size={24} /></button>}
                            <Kanban className="text-brand-blue dark:text-blue-400" size={24} />
                            <h1 className="text-lg md:text-xl font-bold hidden sm:block">TaskBoard</h1>
                        </div>
                        <div className="flex flex-1 max-w-2xl mx-4 gap-2">
                            <div className="relative flex-1 hidden md:block">
                                <Search className="absolute left-2.5 top-2 text-gray-400" size={16} />
                                <input type="text" placeholder="タスクを検索..." value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} 
                                    className="w-full border border-gray-300 dark:border-gray-600 rounded-md pl-8 pr-3 py-1.5 text-sm focus:outline-none focus:border-brand-blue bg-white dark:bg-gray-800 text-gray-900 dark:text-white" />
                            </div>
                            <select value={filterAssignee} onChange={e=>setFilterAssignee(e.target.value)} className="border border-gray-300 dark:border-gray-600 rounded-md px-2 py-1.5 text-sm bg-white dark:bg-gray-800 focus:outline-none hidden sm:block">
                                <option value="">担当者: 全て</option>
                                {uniqueAssignees.map(a => <option key={a} value={a}>{a}</option>)}
                            </select>
                        </div>
                        <div className="flex items-center gap-3">
                            <button onClick={toggleDarkMode} className="p-1.5 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 text-gray-500 dark:text-gray-400 transition-colors">{isDarkMode ? <Sun size={20} /> : <Moon size={20} />}</button>
                            {isSyncing ? <Cloud size={20} className="text-brand-blue animate-pulse" /> : <button onClick={()=>handleFetchFromGithub(false)}><RefreshCw size={20} className="text-gray-400 hover:text-brand-blue" /></button>}
                            <button onClick={() => setIsSettingsOpen(true)}><Settings size={20} className="text-gray-400 hover:text-gray-700 dark:hover:text-gray-200" /></button>
                        </div>
                    </header>

                    <div className="flex flex-1 overflow-hidden">
                        
                        {/* 左サイドバー: 内部スクロール */}
                        <aside className={`w-full md:w-80 bg-gray-50 dark:bg-[#18212f] border-r border-gray-300 dark:border-brand-darkborder flex flex-col h-full shrink-0 transition-colors ${isMobileListOpen ? 'flex' : 'hidden md:flex'}`}>
                            <div className="shrink-0 p-3 border-b border-gray-200 dark:border-brand-darkborder">
                                <button onClick={() => selectProject(null)} className={`w-full flex items-center gap-2 p-3 rounded-lg border transition ${activeProject === null ? 'bg-brand-lightblue dark:bg-blue-900/30 border-brand-blue text-brand-blue dark:text-blue-400 font-bold shadow-sm' : 'bg-white dark:bg-brand-darkcard border-gray-200 dark:border-gray-700 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800'}`}>
                                    <LayoutList size={20} /><span>すべてのタスク</span>
                                </button>
                            </div>
                            <div className="shrink-0 p-3 pb-1">
                                <h2 className="text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Projects</h2>
                            </div>
                            
                            <div className="flex-1 overflow-y-auto px-3 pb-4 space-y-2">
                                {projectStats.map(stat => (
                                    <div key={stat.name} onClick={() => selectProject(stat.name)}
                                        className={`p-3 rounded-lg border cursor-pointer transition ${activeProject === stat.name ? 'bg-white dark:bg-brand-darkcard border-brand-blue shadow-md' : 'bg-white dark:bg-brand-darkcard border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-800'} ${stat.overdue && activeProject !== stat.name ? 'border-brand-lightred dark:border-red-900/50' : ''}`}>
                                        <div className="flex justify-between items-start mb-1.5">
                                            <h3 className={`font-bold text-sm ${activeProject === stat.name ? 'text-brand-blue dark:text-blue-400' : ''}`}>{stat.name}</h3>
                                            {stat.overdue && <span className="bg-brand-red text-white text-[10px] px-1.5 py-0.5 rounded font-bold">遅延</span>}
                                        </div>
                                        <div className="flex items-center justify-between text-xs mb-1.5">
                                            <span className="font-medium text-gray-600 dark:text-gray-400">進捗: {stat.progress}%</span>
                                            <span className="text-gray-500 dark:text-gray-500">{stat.done} / {stat.total}</span>
                                        </div>
                                        <div className="w-full bg-gray-100 dark:bg-gray-700 rounded-full h-1.5">
                                            <div className={`h-1.5 rounded-full ${stat.progress === 100 ? 'bg-gray-400 dark:bg-gray-500' : 'bg-brand-green'}`} style={{ width: `${stat.progress}%` }}></div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                            <div className="shrink-0 p-3 border-t border-gray-200 dark:border-brand-darkborder bg-white dark:bg-brand-darkcard">
                                <button onClick={() => setIsNewProjectOpen(true)} className="w-full flex items-center justify-center gap-2 py-2 text-sm text-gray-600 dark:text-gray-400 hover:text-brand-blue dark:hover:text-blue-400 hover:bg-gray-50 dark:hover:bg-gray-800 rounded-md transition border border-dashed border-gray-300 dark:border-gray-600">
                                    <FolderPlus size={18}/> 新規プロジェクト
                                </button>
                            </div>
                        </aside>

                        {/* メインコンテンツ: 内部スクロール */}
                        <main className={`flex-1 flex flex-col bg-white dark:bg-brand-darkbg h-full overflow-hidden relative transition-colors ${!isMobileListOpen ? 'flex' : 'hidden md:flex'}`}>
                            
                            {/* コンパクトなプロジェクトヘッダー */}
                            {activeProject && (
                                <div className="bg-white dark:bg-brand-darkcard px-4 md:px-6 py-3 border-b border-gray-200 dark:border-brand-darkborder shrink-0 transition-colors flex flex-col gap-2.5">
                                    <div className="flex items-center justify-between">
                                        <div className="flex items-center gap-3">
                                            <h2 className="text-xl font-bold">{activeProject}</h2>
                                            {chartData[3] > 0 && <span className="inline-flex items-center px-2 py-0.5 rounded text-xs font-bold bg-brand-lightred dark:bg-red-900/30 text-brand-red dark:text-red-400 border border-brand-lightred dark:border-red-800"><AlertCircle size={12} className="mr-1"/>要注意</span>}
                                        </div>
                                        <div className="text-xs text-gray-500 dark:text-gray-400 font-medium">総タスク: {activeProjectTasks.length}</div>
                                    </div>
                                    
                                    <div className="flex flex-col gap-1.5">
                                        <div className="w-full h-2.5 bg-gray-100 dark:bg-gray-800 rounded-full flex overflow-hidden">
                                            {activeProjectTasks.length > 0 && (
                                                <>
                                                    <div className="bg-brand-green transition-all duration-500" style={{width: `${(chartData[0] / activeProjectTasks.length) * 100}%`}}></div>
                                                    <div className="bg-brand-blue transition-all duration-500" style={{width: `${(chartData[1] / activeProjectTasks.length) * 100}%`}}></div>
                                                    <div className="bg-brand-red transition-all duration-500" style={{width: `${(chartData[3] / activeProjectTasks.length) * 100}%`}}></div>
                                                </>
                                            )}
                                        </div>
                                        <div className="flex flex-wrap gap-4 text-xs font-medium mt-0.5">
                                            <span className="flex items-center gap-1 text-gray-600 dark:text-gray-400"><span className="w-2.5 h-2.5 rounded-full bg-brand-green"></span>完了: {chartData[0]}</span>
                                            <span className="flex items-center gap-1 text-gray-600 dark:text-gray-400"><span className="w-2.5 h-2.5 rounded-full bg-brand-blue"></span>進行中: {chartData[1]}</span>
                                            <span className="flex items-center gap-1 text-gray-600 dark:text-gray-400"><span className={`w-2.5 h-2.5 rounded-full ${isDarkMode ? 'bg-gray-600' : 'bg-gray-400'}`}></span>未着手: {chartData[2]}</span>
                                            {chartData[3] > 0 && <span className="flex items-center gap-1 text-brand-red dark:text-red-400"><span className="w-2.5 h-2.5 rounded-full bg-brand-red"></span>遅延: {chartData[3]}</span>}
                                        </div>
                                    </div>
                                </div>
                            )}

                            {!activeProject && (
                                <div className="bg-white dark:bg-brand-darkcard px-6 py-4 border-b border-gray-200 dark:border-brand-darkborder shrink-0 flex items-center gap-3 transition-colors">
                                    <LayoutList className="text-gray-400" size={24} />
                                    <div><h2 className="text-lg font-bold">すべてのタスク</h2><p className="text-xs text-gray-500 dark:text-gray-400">対応日付順にソートされています</p></div>
                                </div>
                            )}

                            <div className="flex-1 overflow-y-auto p-4 md:p-6 bg-gray-50 dark:bg-brand-darkbg transition-colors">
                                <form onSubmit={handleQuickAdd} className="bg-white dark:bg-brand-darkcard p-2 rounded-lg border border-brand-blue dark:border-blue-500/50 shadow-sm mb-6 flex items-center gap-3 transition-colors">
                                    <Plus className="text-brand-blue dark:text-blue-400 ml-2" size={20} />
                                    <input type="text" placeholder={`${activeProject || 'Inbox'} にタスクを追加...`} value={newTaskTitle} onChange={e=>setNewTaskTitle(e.target.value)} 
                                        className="flex-1 border-none focus:ring-0 text-sm bg-transparent outline-none py-1 placeholder-gray-400 dark:placeholder-gray-500" />
                                    <button type="submit" disabled={!newTaskTitle} className="bg-brand-blue dark:bg-blue-600 text-white text-xs font-bold px-4 py-2 rounded-md hover:bg-blue-700 disabled:opacity-50 transition">追加</button>
                                </form>

                                {uncompletedTasks.length > 0 ? (
                                    <div className="bg-white dark:bg-brand-darkcard rounded-lg border border-gray-200 dark:border-gray-700 shadow-sm overflow-hidden mb-8">
                                        <table className="min-w-full text-left text-sm">
                                            <thead className="bg-brand-lightgray dark:bg-gray-800/50 border-b border-gray-200 dark:border-gray-700 hidden md:table-header-group">
                                                <tr>
                                                    <th className="w-12 px-4 py-3 text-center"></th>
                                                    <th className="px-4 py-3 font-bold text-gray-600 dark:text-gray-400">タスク名</th>
                                                    {!activeProject && <th className="px-4 py-3 font-bold text-gray-600 dark:text-gray-400">プロジェクト</th>}
                                                    <th className="px-4 py-3 font-bold text-gray-600 dark:text-gray-400">担当者</th>
                                                    <th className="px-4 py-3 font-bold text-gray-600 dark:text-gray-400">ステータス</th>
                                                    <th className="px-4 py-3 font-bold text-gray-600 dark:text-gray-400">期限日</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-gray-100 dark:divide-gray-800 block md:table-row-group">
                                                {uncompletedTasks.map(renderTaskRow)}
                                            </tbody>
                                        </table>
                                    </div>
                                ) : (
                                    <div className="text-center py-10 text-gray-500 dark:text-gray-400 mb-8">未完了のタスクはありません 🎉</div>
                                )}

                                {completedTasks.length > 0 && (
                                    <div>
                                        <button onClick={() => setShowCompleted(!showCompleted)} className="flex items-center gap-2 text-sm font-bold text-gray-500 dark:text-gray-400 mb-3 hover:text-gray-700 dark:hover:text-gray-200 transition-colors">
                                            {showCompleted ? <ChevronDown size={18}/> : <ChevronRight size={18}/>} 完了済みタスク ({completedTasks.length})
                                        </button>
                                        {showCompleted && (
                                            <div className="bg-white dark:bg-brand-darkcard rounded-lg border border-gray-200 dark:border-gray-700 shadow-sm overflow-hidden opacity-80">
                                                <table className="min-w-full text-left text-sm">
                                                    <tbody className="divide-y divide-gray-100 dark:divide-gray-800 block md:table-row-group">
                                                        {completedTasks.map(renderTaskRow)}
                                                    </tbody>
                                                </table>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        </main>
                    </div>

                    {/* タスク詳細ドロワー: 内部スクロール & スワイプ対応 */}
                    <div 
                        className={`fixed inset-y-0 right-0 w-full md:w-96 bg-white dark:bg-brand-darkcard shadow-2xl z-50 transform transition-transform duration-300 border-l border-gray-200 dark:border-gray-700 flex flex-col h-[100dvh] ${selectedTask ? 'translate-x-0' : 'translate-x-full'}`}
                        onTouchStart={handleTouchStart} onTouchMove={handleTouchMove} onTouchEnd={handleTouchEnd}
                    >
                        {selectedTask && (
                            <>
                                <header className="shrink-0 p-4 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center bg-gray-50 dark:bg-gray-800/50">
                                    <h3 className="font-bold flex items-center gap-2">
                                        <button className="md:hidden text-gray-400" onClick={()=>setSelectedTask(null)}><ChevronRight size={20}/></button>
                                        タスク詳細
                                    </h3>
                                    <button onClick={()=>setSelectedTask(null)} className="p-1 rounded-md hover:bg-gray-200 dark:hover:bg-gray-700 text-gray-500"><X size={20}/></button>
                                </header>
                                <div className="flex-1 overflow-y-auto p-5 space-y-5">
                                    <div>
                                        <label className="block text-xs font-bold text-gray-500 dark:text-gray-400 mb-1">プロジェクト</label>
                                        <select value={selectedTask.projectId} onChange={e=>handleUpdateTask({...selectedTask, projectId:e.target.value})} 
                                            className="w-full border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 rounded-md p-2 text-sm outline-none">
                                            {projects.map(p => <option key={p} value={p}>{p}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-gray-500 dark:text-gray-400 mb-1">タスク名</label>
                                        <textarea value={selectedTask.title} onChange={e=>handleUpdateTask({...selectedTask, title:e.target.value})} 
                                            className="w-full border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 rounded-md p-2 text-sm focus:border-brand-blue outline-none resize-none" rows="2" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-xs font-bold text-gray-500 dark:text-gray-400 mb-1">ステータス</label>
                                            <select value={selectedTask.status} onChange={e => changeTaskStatus(selectedTask, e.target.value)} 
                                                className="w-full border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 rounded-md p-2 text-sm outline-none">
                                                <option value="todo">未着手 ( - [ ] )</option>
                                                <option value="in_progress">進行中 ( - [/] )</option>
                                                <option value="done">完了 ( - [x] )</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-gray-500 dark:text-gray-400 mb-1">担当者</label>
                                            <input type="text" value={selectedTask.assignee || ''} onChange={e=>handleUpdateTask({...selectedTask, assignee:e.target.value})} placeholder="例: 佐藤" 
                                                className="w-full border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 rounded-md p-2 text-sm outline-none" />
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-xs font-bold text-gray-500 dark:text-gray-400 mb-1">期限日</label>
                                            <input type="date" value={selectedTask.dueDate || ''} onChange={e=>handleUpdateTask({...selectedTask, dueDate:e.target.value})} 
                                                className="w-full border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 rounded-md p-2 text-sm outline-none text-brand-blue dark:text-blue-400" />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-bold text-gray-500 dark:text-gray-400 mb-1 flex items-center gap-1"><Repeat size={12}/> 繰り返し</label>
                                            <select value={selectedTask.recurrence || ''} onChange={e=>handleUpdateTask({...selectedTask, recurrence:e.target.value})} 
                                                className="w-full border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 rounded-md p-2 text-sm outline-none">
                                                <option value="">なし</option>
                                                <option value="every day">毎日</option>
                                                <option value="every weekday">平日</option>
                                                <option value="every week">毎週</option>
                                                <option value="every month">毎月</option>
                                                <option value="every year">毎年</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div className="flex-1 flex flex-col">
                                        <label className="block text-xs font-bold text-gray-500 dark:text-gray-400 mb-1">ノート・詳細 (Markdown)</label>
                                        <textarea value={selectedTask.notes || ''} onChange={e=>handleUpdateTask({...selectedTask, notes:e.target.value})} 
                                            className="w-full min-h-[150px] border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 rounded-md p-2 text-sm outline-none font-mono resize-none flex-1" />
                                    </div>
                                </div>
                            </>
                        )}
                    </div>

                    {/* モーダル群 (New Project & Settings) は省略せず維持 */}
                    <div className={`fixed inset-0 bg-black/60 z-50 flex items-center justify-center transition-opacity ${isNewProjectOpen ? 'opacity-100 pointer-events-auto' : 'opacity-0 pointer-events-none'}`}>
                        <div className="bg-white dark:bg-brand-darkcard rounded-lg shadow-xl w-full max-w-sm m-4">
                            <header className="px-5 py-4 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center bg-gray-50 dark:bg-gray-800/50">
                                <h3 className="font-bold flex items-center gap-2"><FolderPlus size={18}/> 新規プロジェクト</h3>
                                <button onClick={()=>setIsNewProjectOpen(false)}><X size={20} className="text-gray-500"/></button>
                            </header>
                            <form onSubmit={handleCreateProject} className="p-5 space-y-4">
                                <div>
                                    <label className="block text-xs font-bold text-gray-600 dark:text-gray-400 mb-2">プロジェクト名</label>
                                    <input type="text" value={newProjectName} onChange={e=>setNewProjectName(e.target.value)} placeholder="例: デザインリニューアル" autoFocus className="w-full border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 rounded p-2 text-sm outline-none focus:border-brand-blue" />
                                </div>
                                <div className="flex gap-2 justify-end pt-2">
                                    <button type="button" onClick={()=>setIsNewProjectOpen(false)} className="px-4 py-2 text-sm text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800 rounded">キャンセル</button>
                                    <button type="submit" disabled={!newProjectName.trim()} className="bg-brand-blue dark:bg-blue-600 text-white font-bold px-4 py-2 text-sm rounded disabled:opacity-50 hover:bg-blue-700">作成</button>
                                </div>
                            </form>
                        </div>
                    </div>

                    <div className={`fixed inset-0 bg-black/60 z-[60] flex items-center justify-center transition-opacity ${isSettingsOpen ? 'opacity-100 pointer-events-auto' : 'opacity-0 pointer-events-none'}`}>
                        <div className="bg-white dark:bg-brand-darkcard rounded-lg shadow-xl w-full max-w-md m-4">
                            <header className="px-5 py-4 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center bg-gray-50 dark:bg-gray-800/50">
                                <h3 className="font-bold flex items-center gap-2"><Github size={20}/> GitHub Sync 設定</h3>
                                <button onClick={()=>setIsSettingsOpen(false)}><X size={20} className="text-gray-500"/></button>
                            </header>
                            <div className="p-5 space-y-4">
                                <div><label className="block text-xs font-bold text-gray-600 dark:text-gray-400 mb-1">Personal Access Token</label><input type="password" value={githubConfig.token} onChange={e=>setGithubConfig({...githubConfig, token:e.target.value})} className="w-full border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 rounded p-2 text-sm outline-none" /></div>
                                <div className="flex gap-3">
                                    <div className="flex-1"><label className="block text-xs font-bold text-gray-600 dark:text-gray-400 mb-1">Owner</label><input type="text" value={githubConfig.owner} onChange={e=>setGithubConfig({...githubConfig, owner:e.target.value})} className="w-full border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 rounded p-2 text-sm outline-none" /></div>
                                    <div className="flex-1"><label className="block text-xs font-bold text-gray-600 dark:text-gray-400 mb-1">Repo</label><input type="text" value={githubConfig.repo} onChange={e=>setGithubConfig({...githubConfig, repo:e.target.value})} className="w-full border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 rounded p-2 text-sm outline-none" /></div>
                                </div>
                                <div><label className="block text-xs font-bold text-gray-600 dark:text-gray-400 mb-1">File Path</label><input type="text" value={githubConfig.path} onChange={e=>setGithubConfig({...githubConfig, path:e.target.value})} placeholder="Tasks.md" className="w-full border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 rounded p-2 text-sm outline-none" /></div>
                                <button onClick={() => { localStorage.setItem('obsidian_github_config', JSON.stringify(githubConfig)); setIsSettingsOpen(false); handleFetchFromGithub(false); }} className="w-full bg-brand-blue dark:bg-blue-600 text-white font-bold py-2 rounded mt-2 flex items-center justify-center gap-2 hover:bg-blue-700 dark:hover:bg-blue-500"><Save size={18}/> 保存して同期</button>
                            </div>
                        </div>
                    </div>

                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
